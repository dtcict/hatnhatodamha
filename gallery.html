<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tư Liệu Ảnh - Hát Múa Cửa Đình</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { heritage: { 500: '#cc4425', 950: '#1c0500' }, gold: '#dfb76c' } } } }
    </script>
    <style>
        .glass-nav { background: rgba(28, 5, 0, 0.8); backdrop-filter: blur(12px); }
        /* Hiệu ứng Lightbox */
        #lightbox { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        #lightbox img { max-width: 90%; max-height: 80%; border: 4px solid #fff; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 font-sans pb-20">

    <nav class="glass-nav fixed top-0 left-0 right-0 z-50 border-b border-white/10 py-5 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-6 h-10 flex items-center justify-between">
            <a href="index.html" class="text-2xl font-serif font-bold text-gold tracking-wider">CỬA ĐÌNH</a>
            <div class="hidden md:flex items-center space-x-6 text-sm font-medium text-stone-300">
                <a href="index.html" class="hover:text-white">Trang Chủ</a>
                <a href="videos.html" class="hover:text-white">Phim & Trailer</a>
                <a href="audio.html" class="hover:text-white">Âm Thanh</a>
                <a href="gallery.html" class="text-gold border-b border-gold">Tư Liệu Ảnh</a>
                <a href="ebook.html" class="hover:text-white">E-Book</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pt-32">
        <header class="mb-12">
            <h1 class="text-4xl font-serif font-bold text-heritage-950">6. Tư Liệu Ảnh</h1>
            <p class="text-stone-500 mt-2">Ghi chép hình ảnh về trang phục, nghệ nhân và không gian diễn xướng tại đình làng.</p>
        </header>

        <div class="columns-1 md:columns-2 lg:columns-3 gap-6 space-y-6">
            <div class="break-inside-avoid rounded-xl overflow-hidden cursor-pointer hover:opacity-90 transition-opacity" onclick="openLightbox('https://images.unsplash.com/photo-1599940824399-b87987ceb72a?auto=format&fit=crop&w=800&q=80')">
                <img src="https://images.unsplash.com/photo-1599940824399-b87987ceb72a?auto=format&fit=crop&w=800&q=80" class="w-full rounded-xl" alt="Tư liệu 1">
            </div>
            <div class="break-inside-avoid rounded-xl overflow-hidden cursor-pointer hover:opacity-90 transition-opacity" onclick="openLightbox('https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?auto=format&fit=crop&w=800&q=80')">
                <img src="https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?auto=format&fit=crop&w=800&q=80" class="w-full rounded-xl" alt="Tư liệu 2">
            </div>
            <div class="break-inside-avoid rounded-xl overflow-hidden cursor-pointer hover:opacity-90 transition-opacity" onclick="openLightbox('https://images.unsplash.com/photo-1533174072545-e74b341f6920?auto=format&fit=crop&w=800&q=80')">
                <img src="https://images.unsplash.com/photo-1533174072545-e74b341f6920?auto=format&fit=crop&w=800&q=80" class="w-full rounded-xl" alt="Tư liệu 3">
            </div>
            </div>
    </main>

    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="Full view">
        <span class="absolute top-5 right-10 text-white text-4xl cursor-pointer font-bold">&times;</span>
    </div>

    <script>
        function openLightbox(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }
        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }
    </script>
</body>
</html>
